services:
  postgres:
    profiles: [db]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lifesound}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lifesound}
      POSTGRES_DB: ${POSTGRES_DB:-lifesound}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_003:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lifesound} -d ${POSTGRES_DB:-lifesound}"]
      interval: 3s
      timeout: 3s
      retries: 10

  pgadmin:
    profiles: [db]
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-lifesound}:${POSTGRES_PASSWORD:-lifesound}@postgres:5432/${POSTGRES_DB:-lifesound}?sslmode=disable}
      AUTO_MIGRATE: "true"
      MIGRATIONS_PATH: /migrations
    restart: unless-stopped

volumes:
  pgdata_003: {}
